<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>ccy❤lst</title>
  <style>
    * { box-sizing: border-box; }
    body {
      margin: 0;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      background: radial-gradient(circle at top, #1f1f1f 0%, #080808 55%, #000 100%);
      font-family: Arial, Helvetica, sans-serif;
      overflow: hidden;
    }
    .wrap {
      text-align: center;
      padding: 24px;
      animation: float 3.5s ease-in-out infinite;
    }
    .text {
      color: #fff;
      font-size: clamp(42px, 10vw, 110px);
      font-weight: 700;
      letter-spacing: 0.08em;
      text-shadow: 0 0 18px rgba(255,255,255,0.18);
      display: inline-flex;
      align-items: center;
      gap: 0.2em;
      flex-wrap: wrap;
      justify-content: center;
    }
    .heart {
      color: #ff4d6d;
      text-shadow: 0 0 16px rgba(255, 77, 109, 0.7);
      animation: pulse 1.3s ease-in-out infinite;
    }
    @keyframes pulse {
      0%, 100% { transform: scale(1); }
      50% { transform: scale(1.16); }
    }
    @keyframes float {
      0%, 100% { transform: translateY(0); }
      50% { transform: translateY(-8px); }
    }
  </style>
</head>
<body>
  <div class="wrap">
    <div class="text">
      <span>ccy</span>
      <span class="heart">❤</span>
      <span>lst</span>
    </div>
  </div>
</body>
</html>
